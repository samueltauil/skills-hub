# Security rules for skill scanning
# Each rule specifies patterns to detect potentially dangerous constructs
# in skill files and SKILL.md code examples.
#
# Fields:
#   id          - unique rule identifier
#   name        - human-readable rule name
#   description - explanation of what is flagged and why
#   severity    - high | medium | low
#   patterns    - list of regex strings (any match triggers the rule)
#   languages   - optional list of languages this rule applies to
#                 (empty list = applies to all languages)
#   extensions  - optional list of file extensions this rule applies to
#                 when scanning skill files (empty = all files)

rules:
  - id: shell-exec
    name: Shell Command Execution
    description: >
      Detects shell execution functions that could run arbitrary system commands,
      such as exec(), spawn(), or subprocess calls.
    severity: high
    patterns:
      - 'child_process\s*\.'
      - '\bexecSync\s*\('
      - '\bspawnSync\s*\('
      - '\bexecFileSync\s*\('
      - '\bsubprocess\s*\.'
      - '\bos\.system\s*\('
      - '\bos\.popen\s*\('
    languages: [javascript, typescript, python]

  - id: eval-usage
    name: Dynamic Code Evaluation
    description: >
      Detects eval() or equivalent dynamic code execution that can run
      arbitrary code supplied at runtime.
    severity: high
    patterns:
      - '\beval\s*\('
      - '\bnew\s+Function\s*\('
      - '\bexec\s*\(\s*[''"]'
    languages: [javascript, typescript, python]

  - id: unsafe-deserialization
    name: Unsafe Deserialization
    description: >
      Detects deserialization of untrusted data which can lead to remote code
      execution (pickle, yaml.load without Loader, etc.).
    severity: high
    patterns:
      - '\bpickle\.loads?\s*\('
      - '\byaml\.load\s*\([^,)]+\)'
      - '\bunserialize\s*\('
    languages: [python, php]

  - id: hardcoded-secret
    name: Hardcoded Credential or Secret
    description: >
      Detects hardcoded API keys, passwords, or tokens in code examples.
    severity: high
    flags: 'i'
    patterns:
      - '(api[_-]?key|password|secret|token)\s*=\s*[''"][a-zA-Z0-9+/]{8,}'
      - 'Authorization:\s+Bearer\s+[a-zA-Z0-9\-_\.]{20,}'
    languages: []

  - id: network-to-external
    name: Network Request to External URL
    description: >
      Detects outbound HTTP requests to external hosts embedded in code
      examples without a clear explanation.
    severity: medium
    patterns:
      - 'https?://(?!github\.com|raw\.githubusercontent\.com|docs\.github\.com)[a-zA-Z0-9._-]+\.[a-zA-Z]{2,}'
    languages: [bash, javascript, typescript, python]

  - id: curl-wget-unsafe
    name: Curl/Wget Pipe to Shell
    description: >
      Detects the classic curl-pipe-to-shell pattern which executes remote
      scripts without inspection.
    severity: high
    patterns:
      - 'curl\s+.*\|\s*(bash|sh|zsh|fish)'
      - 'wget\s+.*\|\s*(bash|sh|zsh|fish)'
      - 'curl\s+.*\|\s*sudo'
    languages: [bash]

  - id: path-traversal
    name: Path Traversal
    description: >
      Detects "../" sequences in file path construction that could escape
      intended directories.
    severity: medium
    patterns:
      - '\.\./\.\.'
      - '\.\./'
    languages: []

  - id: sensitive-file-access
    name: Sensitive File Access
    description: >
      Detects code that reads well-known sensitive system files
      (e.g., /etc/passwd, ~/.ssh/).
    severity: medium
    patterns:
      - '/etc/passwd'
      - '/etc/shadow'
      - '~/\.ssh/'
      - '~/.aws/credentials'
    languages: []

  - id: sql-injection-risk
    name: SQL Injection Risk
    description: >
      Detects string concatenation used to build SQL queries which may
      introduce injection vulnerabilities.
    severity: medium
    patterns:
      - 'SELECT\s+.*\+\s*'
      - 'INSERT\s+INTO\s+.*\+\s*'
      - 'f[''"]SELECT\s+.*\{[^}]+\}'
    languages: [python, javascript, typescript]

  - id: base64-exec
    name: Base64 Decode and Execute
    description: >
      Detects patterns where base64-encoded data is decoded and then
      executed, a common technique for hiding malicious payloads.
    severity: high
    patterns:
      - '\batob\s*\([^)]+\)'
      - 'Buffer\.from\s*\([^,]+,\s*[''"]base64[''"]'
      - 'base64\.b64decode\s*\('
      - 'base64\s+-d'
    languages: []

  - id: env-exfiltration
    name: Environment Variable Exfiltration
    description: >
      Detects patterns where environment variables (which may contain
      secrets) are sent to external services via network requests.
    severity: high
    flags: 'i'
    patterns:
      - 'process\.env\b.*\b(fetch|axios|request|http\.get|https\.get)\b'
      - '\b(fetch|axios|request|http\.get|https\.get)\b.*process\.env\b'
      - 'os\.environ\b.*\brequests\.(get|post)\b'
      - '\brequests\.(get|post)\b.*os\.environ\b'
    languages: [javascript, typescript, python]

  - id: sensitive-path-write
    name: Write to Sensitive Paths
    description: >
      Detects code that writes to sensitive system directories or
      configuration files that could compromise the host system.
    severity: high
    patterns:
      - 'writeFile.*(/etc/|/usr/local/bin|~/.bashrc|~/.zshrc|~/.profile|~/.bash_profile)'
      - 'fs\.write.*(/etc/|/usr/local/bin)'
      - 'open\s*\(\s*[''"](/etc/|/usr/local/bin|~/.bashrc|~/.zshrc)'
    languages: []

  - id: prompt-injection
    name: Prompt Injection Markers
    description: >
      Detects phrases commonly used in prompt injection attacks that attempt
      to override AI safety guidelines or manipulate model behavior.
    severity: high
    flags: 'i'
    patterns:
      - 'ignore\s+(all\s+)?(previous|prior|above)\s+(instructions|rules|guidelines)'
      - 'disregard\s+(all\s+)?(previous|prior|above)\s+(instructions|rules)'
      - 'you\s+are\s+now\s+(a|an|in)\s+'
      - 'override\s+(safety|system|security)\s+(prompt|instructions|guidelines|rules)'
      - 'do\s+not\s+follow\s+(the\s+)?(system|safety|previous)\s+'
      - 'bypass\s+(content|safety|security)\s+(filter|policy|restriction)'
    languages: []
